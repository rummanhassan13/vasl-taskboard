  a("assets","Product photography shoot","M1","high");a("assets","Homepage hero banner","M1","high");a("assets","Packaging print-ready file","M1","high");
  a("copy","Homepage headline","M1","high");a("copy","Product page copy","M1","high");a("copy","WhatsApp greeting message","M1","high");a("copy","Ad copy set Month 2","M2","high");
  a("ads","Meta Business Manager setup","M1","high");a("ads","Pixel events verified","M1","high");a("ads","Month 2 Click-to-WhatsApp","M2","high");a("ads","Month 3 Advantage+ Shopping","M3","high");
  a("ops","SECP business registration","M1","high");a("ops","NTN / FBR tax registration","M1","high");a("ops","Halal certification","M1","high");a("ops","Contract manufacturer finalized","M1","high");a("ops","First production run","M1","high");a("ops","Leopards Courier account","M1","high");a("ops","WhatsApp Business verified","M1","high");
  return rows;

/* ── MAIN APP ── */
function App(){
  const[user,setUser]=useState(null);const[loading,setLoad]=useState(true);
  const[tab,setTab]=useState(()=>localStorage.getItem("vasl_tab")||"tasks");
  const[dark,setDark]=useState(()=>localStorage.getItem("vasl_dark")==="1");
  const[toast,setToast]=useState(null);const[showLog,setSL]=useState(false);
  const[expenses,setExpenses]=useState([]);const[bankBalance,setBankBalance]=useState(0);
  const[tasks,setTasks]=useState([]);const[launchTasks,setLaunchTasks]=useState([]);
  const[orders,setOrders]=useState([]);const[calEvents,setCalEvents]=useState([]);
  const[dataLoading,setDataLoading]=useState(true);

  const flash=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
  useEffect(()=>{document.documentElement.setAttribute("data-theme",dark?"dark":"light");localStorage.setItem("vasl_dark",dark?"1":"0");},[dark]);
  useEffect(()=>{localStorage.setItem("vasl_tab",tab);},[tab]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);setLoad(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setUser(session?.user||null);});
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!user)return;
    setDataLoading(true);
    (async()=>{
      const[e,t,lt,o,ce,s]=await Promise.all([
        sb.from("expenses").select("*").order("date",{ascending:false}),
        sb.from("tasks").select("*").order("created_at",{ascending:false}),
        sb.from("launch_tasks").select("*").order("id",{ascending:true}),
        sb.from("orders").select("*").order("created_at",{ascending:false}),
        sb.from("calendar_events").select("*").order("date",{ascending:true}),
        sb.from("settings").select("*"),
      ]);
      setExpenses(e.data||[]);setTasks(t.data||[]);setOrders(o.data||[]);setCalEvents(ce.data||[]);
      if(!lt.data||lt.data.length===0){
        const def=defaultLaunchTasks();
        await sb.from("launch_tasks").insert(def);
        setLaunchTasks(def);
      }else setLaunchTasks(lt.data);
      const settings=s.data||[];const bal=settings.find(x=>x.key==="bank_balance");
      if(bal)setBankBalance(Number(typeof bal.value==="string"?JSON.parse(bal.value):bal.value)||0);
      setDataLoading(false);
    })();
  },[user]);

  /* Realtime subscriptions: orders + tasks */
  useEffect(()=>{
    if(!user)return;
    const ordersChan=sb.channel("rt-orders")
      .on("postgres_changes",{event:"*",schema:"public",table:"orders"},payload=>{
        const{eventType,new:newRow,old:oldRow}=payload;
        if(eventType==="INSERT"){setOrders(prev=>prev.find(x=>x.id===newRow.id)?prev:[newRow,...prev]);}
        else if(eventType==="UPDATE"){setOrders(prev=>prev.map(x=>x.id===newRow.id?{...x,...newRow}:x));}
        else if(eventType==="DELETE"){setOrders(prev=>prev.filter(x=>x.id!==oldRow.id));}
      })
      .subscribe();
    const tasksChan=sb.channel("rt-tasks")
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},payload=>{
        const{eventType,new:newRow,old:oldRow}=payload;
        if(eventType==="INSERT"){setTasks(prev=>prev.find(x=>x.id===newRow.id)?prev:[newRow,...prev]);}
        else if(eventType==="UPDATE"){setTasks(prev=>prev.map(x=>x.id===newRow.id?{...x,...newRow}:x));}
        else if(eventType==="DELETE"){setTasks(prev=>prev.filter(x=>x.id!==oldRow.id));}
      })
      .subscribe();
    return()=>{
      sb.removeChannel(ordersChan);
      sb.removeChannel(tasksChan);
    };
  },[user]);

  const handleLogout=async()=>{await sb.auth.signOut();setUser(null);};

  if(loading)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100dvh",background:"var(--bg)",gap:16}}>
    <div className="wordmark" style={{fontSize:38,color:"var(--gold)",letterSpacing:3,fontWeight:600}}>وصل</div>
    <Skel w={120} h={12}/>
  </div>);
  if(!user)return <LoginScreen/>;

  const renderTab=()=>{
    if(dataLoading){
      return(<div>
        <div style={S.sec}>Loading…</div>
        <SkelStats count={4}/>
        <div style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
          {Array.from({length:6}).map((_,i)=><SkelRow key={i}/>)}
        </div>
      </div>);
    }
    switch(tab){
      case "tasks":    return <TasksTab tasks={tasks} setTasks={setTasks} userEmail={user.email} flash={flash}/>;
      case "calendar": return <CalendarTab events={calEvents} setEvents={setCalEvents} userEmail={user.email} flash={flash}/>;
      case "launch":   return <LaunchTab launchTasks={launchTasks} setLaunchTasks={setLaunchTasks} userEmail={user.email} flash={flash}/>;
      case "orders":   return <OrdersTab orders={orders} setOrders={setOrders} userEmail={user.email} flash={flash}/>;
      case "expenses": return <ExpensesTab expenses={expenses} setExpenses={setExpenses} bankBalance={bankBalance} setBankBalance={setBankBalance} userEmail={user.email} flash={flash}/>;
      case "overview": return <OverviewTab data={{expenses,tasks,launchTasks,orders,calEvents}}/>;
      default:         return <TasksTab tasks={tasks} setTasks={setTasks} userEmail={user.email} flash={flash}/>;
    }
  };

  return(<div style={{background:"var(--bg)",minHeight:"100dvh",color:"var(--text)"}}>
    <Header tab={tab} setTab={setTab} dark={dark} setDark={setDark} onLogout={handleLogout} onShowLog={()=>setSL(true)}/>
    <main className="main-content" style={{padding:"24px 32px",maxWidth:1280,margin:"0 auto"}}>{renderTab()}</main>
    <Toast toast={toast}/>
    <ActivityLog open={showLog} onClose={()=>setSL(false)}/>
    <BottomNav tab={tab} setTab={setTab}/>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
