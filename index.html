<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Vasl · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<style>
*,*::before,*::after{box-sizing:border-box;}
:root{
  /* Brand */
  --bg:#f2ecdf;              /* page bg (slightly darker than card) */
  --bg2:#ede6d6;
  --card:#f8f3e8;            /* card bg — lighter than page */
  --card2:#fbf7ee;
  --wine:#3c060d;
  --gold:#bf933e;
  --green:#1c4a35;
  --noir:#110509;
  --ivory:#f5f0e6;
  --border:rgba(60,6,13,0.14);
  --border2:rgba(60,6,13,0.08);
  --text:#3c060d;
  --text2:rgba(60,6,13,0.62);
  --text3:rgba(60,6,13,0.38);
  --row:rgba(60,6,13,0.02);
  --soft-warn:rgba(60,6,13,0.08);    /* non-destructive negative */
  --soft-warn-text:#3c060d;
  --danger:#8b1a1a;                   /* genuinely destructive only */
  --dangerBg:rgba(139,26,26,0.08);
  /* Spacing (4/8 grid) */
  --s4:4px;--s8:8px;--s12:12px;--s16:16px;--s20:20px;--s24:24px;--s32:32px;--s40:40px;--s48:48px;--s64:64px;
  --touch:32px;              /* desktop */
  /* Type */
  --font-d:'Cormorant Garamond',Georgia,serif;
  --font-b:'DM Sans',system-ui,sans-serif;
  --header-h:56px;
  --botnav-h:64px;
}
[data-theme="dark"]{
  --bg:#0c0407;
  --bg2:#120609;
  --card:#1a0a10;
  --card2:#22101a;
  --wine:#f5f0e6;
  --gold:#d4a94e;
  --green:#2a7a55;
  --noir:#f5f0e6;
  --ivory:#f5f0e6;
  --border:rgba(212,169,78,0.16);
  --border2:rgba(212,169,78,0.08);
  --text:#f2e8d5;
  --text2:rgba(242,232,213,0.6);
  --text3:rgba(242,232,213,0.38);
  --row:rgba(242,232,213,0.02);
  --soft-warn:rgba(212,169,78,0.1);
  --soft-warn-text:#f2e8d5;
  --danger:#f87171;
  --dangerBg:rgba(248,113,113,0.1);
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:13px;-webkit-font-smoothing:antialiased;}
body.lock{overflow:hidden;}
/* Strictly DM Sans for data/UI */
table, table *, input, select, textarea, button, .badge, .meta, .data, th, td {
  font-family:var(--font-b) !important;
}
/* Cormorant only on explicit display classes */
.display, .kpi-num, .wordmark {
  font-family:var(--font-d) !important;
}
input,select,textarea,button{font-family:var(--font-b);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(191,147,62,0.25);border-radius:3px;}
select option{background:var(--card);color:var(--text);}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{
  0%,100%{background-position:-200px 0;}
  50%{background-position:calc(200px + 100%) 0;}
}
.skel{
  background:linear-gradient(90deg,
    rgba(191,147,62,0.06) 0%,
    rgba(191,147,62,0.16) 50%,
    rgba(191,147,62,0.06) 100%);
  background-size:200px 100%;
  background-repeat:no-repeat;
  animation:pulse 1.4s ease-in-out infinite;
  border-radius:6px;
  display:block;
}

/* Touch targets */
.touch{min-width:var(--touch);min-height:var(--touch);display:inline-flex;align-items:center;justify-content:center;}

/* Cards — elevation by lightness, no shadows */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
}
.card-raised{
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:12px;
}

/* Header bottom-nav on mobile */
.bottom-nav{
  display:none;
}
@media(max-width:768px){
  :root{--touch:48px;}
  .desktop-tabs{display:none!important;}
  .mobile-menu-btn{display:none!important;}
  .main-content{padding:var(--s16)!important;padding-bottom:calc(var(--botnav-h) + env(safe-area-inset-bottom) + var(--s16))!important;}
  .grid-4{grid-template-columns:1fr 1fr!important;}
  .grid-2col{grid-template-columns:1fr!important;}
  .header-inner{padding:0 var(--s12)!important;}
  .stat-cards{grid-template-columns:1fr 1fr!important;}
  .kanban-cols{grid-template-columns:1fr!important;}
  .cal-grid{grid-template-columns:repeat(7,1fr)!important;font-size:10px!important;}
  .filter-bar,.pill-row{flex-wrap:wrap!important;}
  .pill-row button{min-height:var(--touch);}
  .overview-bottom{grid-template-columns:1fr!important;}
  .cat-resp{grid-template-columns:1fr 1fr!important;}
  .form-2col{grid-template-columns:1fr!important;}
  .bottom-nav{
    display:flex;
    position:fixed;left:0;right:0;bottom:0;
    background:var(--wine);
    border-top:1px solid rgba(191,147,62,0.22);
    padding-bottom:env(safe-area-inset-bottom);
    z-index:150;
    justify-content:space-around;
    height:calc(var(--botnav-h) + env(safe-area-inset-bottom));
  }
  /* Card-ify tables on mobile */
  .cardify thead{display:none;}
  .cardify table, .cardify tbody, .cardify tr, .cardify td{
    display:block;width:100%;
  }
  .cardify table{min-width:0!important;}
  .cardify tr{
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:var(--s12);
    margin-bottom:var(--s8);
  }
  .cardify td{
    padding:var(--s4) 0!important;
    border:none!important;
    text-align:left!important;
    max-width:none!important;
    white-space:normal!important;
    overflow:visible!important;
    text-overflow:clip!important;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:var(--s8);
  }
  .cardify td::before{
    content:attr(data-label);
    font-size:10px;
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text3);
    flex-shrink:0;
  }
  .cardify td.td-full{display:block;}
  .cardify td.td-full::before{display:block;margin-bottom:var(--s4);}
  /* Bottom sheet modals */
  .modal-wrap{align-items:flex-end!important;padding:0!important;}
  .modal-panel{
    width:100%!important;
    max-width:none!important;
    border-radius:16px 16px 0 0!important;
    height:90dvh!important;
    max-height:90dvh!important;
    animation:slideUp 0.25s ease!important;
    padding-top:var(--s16)!important;
  }
  .sheet-handle{
    display:block!important;
  }
}
.bottom-nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  background:transparent;
  border:none;
  color:rgba(245,240,230,0.55);
  padding:var(--s8) var(--s4);
  min-height:var(--botnav-h);
  cursor:pointer;
}
.bottom-nav-btn.active{
  color:var(--gold);
  background:rgba(191,147,62,0.1);
}
.bottom-nav-btn .label{font-size:10px;letter-spacing:0.5px;font-weight:600;}
.sheet-handle{display:none;width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto var(--s12) auto;}

/* Bulk bar */
.bulk-bar{
  position:fixed;
  left:50%;transform:translateX(-50%);
  bottom:calc(var(--s24) + env(safe-area-inset-bottom));
  background:var(--wine);
  color:var(--ivory);
  border-radius:12px;
  padding:var(--s12) var(--s16);
  display:flex;gap:var(--s8);align-items:center;
  z-index:120;
  border:1px solid rgba(191,147,62,0.3);
}
@media(max-width:768px){
  .bulk-bar{
    bottom:calc(var(--botnav-h) + env(safe-area-inset-bottom) + var(--s12));
    left:var(--s12);right:var(--s12);transform:none;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useMemo}=React;
const SUPABASE_URL="https://YOUR_PROJECT.supabase.co";
const SUPABASE_ANON_KEY="YOUR_ANON_KEY";
const CLOUDINARY_CLOUD="YOUR_CLOUD_NAME";
const CLOUDINARY_PRESET="YOUR_UPLOAD_PRESET";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

/* ── Helpers ── */
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const pkr=n=>"Rs. "+Math.abs(Number(n||0)).toLocaleString("en-PK",{maximumFractionDigits:0});
const fmtDate=d=>{if(!d)return"—";const dt=new Date(d+"T00:00:00");return dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});};
const fmtShort=d=>{if(!d)return"—";const dt=new Date(d+"T00:00:00");return dt.toLocaleDateString("en-GB",{day:"numeric",month:"short"});};
const today=()=>new Date().toISOString().slice(0,10);
const nowYM=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
const TEAM=["Rumman","Sajawal","Bilal"];
const teamColor={Rumman:"#3c060d",Sajawal:"#1c4a35",Bilal:"#bf933e"};

/* SHA-256 hashing for PIN */
async function sha256Hex(str){
  const b=new TextEncoder().encode(str);
  const h=await crypto.subtle.digest("SHA-256",b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,"0")).join("");
}

const logActivity=async(action,module,detail,email)=>{try{await sb.from("activity_log").insert({action,module,detail,user_email:email});}catch(e){}};

/* Upload validation + Cloudinary */
const MAX_UPLOAD_BYTES=5*1024*1024;
function validateUpload(file){
  if(!file)return"No file selected.";
  if(!file.type||!file.type.startsWith("image/"))return"Only image files allowed.";
  if(file.size>MAX_UPLOAD_BYTES)return`File too large. Max 5MB (yours is ${(file.size/1024/1024).toFixed(1)}MB).`;
  return null;
}
async function uploadToCloudinary(file){
  const err=validateUpload(file);
  if(err)throw new Error(err);
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",CLOUDINARY_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:"POST",body:fd});
  const data=await res.json();
  if(!data.secure_url)throw new Error(data.error?.message||"Upload failed");
  return data.secure_url;
}

/* CSV export */
function toCsvValue(v){
  if(v==null)return"";
  const s=String(v);
  if(/[",\n\r]/.test(s))return'"'+s.replace(/"/g,'""')+'"';
  return s;
}
function downloadCsv(filename,headers,rows){
  const lines=[headers.map(toCsvValue).join(",")];
  rows.forEach(r=>lines.push(r.map(toCsvValue).join(",")));
  const csv=lines.join("\r\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

  moon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>,

  grid:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
  img:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>,
  warn:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,

  list:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,

/* ── Tokens ── */
const S={
  input:{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"12px 12px",fontSize:13,color:"var(--text)",outline:"none",minHeight:44},
  select:{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"12px 12px",fontSize:13,color:"var(--text)",outline:"none",cursor:"pointer",minHeight:44},
  filterSel:{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"var(--text)",outline:"none",cursor:"pointer",minHeight:32},
  btn:{background:"var(--gold)",color:"var(--noir)",border:"none",borderRadius:8,padding:"12px 20px",fontSize:13,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,minHeight:40,justifyContent:"center"},
  btnO:{background:"transparent",border:"1px solid var(--border)",borderRadius:8,padding:"12px 20px",fontSize:13,color:"var(--text2)",cursor:"pointer",minHeight:40,display:"inline-flex",alignItems:"center",gap:8,justifyContent:"center"},

const catBadge={

const TABS=[
  {id:"tasks",label:"Tasks",icon:I.task},
  {id:"calendar",label:"Calendar",icon:I.cal},
  {id:"launch",label:"Launch",icon:I.rocket},
  {id:"orders",label:"Orders",icon:I.truck},
  {id:"expenses",label:"Expenses",icon:I.spend},

/* ── Shared Components ── */
function Modal({open,onClose,title,sub,children,width}){
  useEffect(()=>{
    if(open){document.body.classList.add("lock");}
    else{document.body.classList.remove("lock");}
    return()=>document.body.classList.remove("lock");
  },[open]);
  if(!open)return null;
  return(
    <div className="modal-wrap" onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(17,5,9,0.5)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
      <div className="modal-panel" style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:14,padding:"28px 24px",width:"100%",maxWidth:width||460,animation:"fadeIn 0.2s ease",maxHeight:"90dvh",overflowY:"auto"}}>
        <div className="sheet-handle"/>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:4,gap:12}}>
          <div>
            <div className="display" style={{fontSize:24,fontWeight:600,lineHeight:1.1}}>{title}</div>

const EXP_CATS=["Marketing","Manufacturing","Packaging","Logistics","Operations","R&D","Other"];
function ExpensesTab({expenses,setExpenses,bankBalance,setBankBalance,userEmail,flash}){
  const[pinOk,setPinOk]=useState(false);const[pinInput,setPinInput]=useState("");const[pinErr,setPinErr]=useState("");
  const[storedPin,setStoredPin]=useState(null);const[pinLoading,setPinLoading]=useState(true);const[showModal,setShowModal]=useState(false);
  const[filterCat,setFC]=useState("All");const[filterMo,setFM]=useState("All");const[search,setSrch]=useState("");
  const[sortDir,setSD]=useState("desc");const[deleteId,setDI]=useState(null);const[saving,setSaving]=useState(false);
  const[editBal,setEB]=useState(false);const[balInput,setBI]=useState("");
  const[form,setForm]=useState({date:today(),category:"Marketing",description:"",amount:""});const[formErr,setFE]=useState("");

  useEffect(()=>{(async()=>{
    const{data}=await sb.from("settings").select("value").eq("key","expense_pin").single();
    setStoredPin(data?data.value:null);
    setPinLoading(false);
  })();},[]);

  const handlePin=async()=>{
    if(!pinInput||pinInput.length<4)return setPinErr("PIN must be at least 4 digits.");
    const hashInput=await sha256Hex(pinInput);
    const raw=storedPin;
    const strVal=typeof raw==="string"?raw.replace(/^"|"$/g,""):raw;
    const isUnset=strVal==="not_set"||raw===null||raw===undefined;
    if(isUnset){
      // first-time setup
      await sb.from("settings").upsert({key:"expense_pin",value:hashInput,updated_at:new Date().toISOString()});
      setStoredPin(hashInput);setPinOk(true);return;
    }
    // Stored format check: 64-char hex = hashed; otherwise legacy plaintext
    const isHashed=typeof strVal==="string"&&/^[0-9a-f]{64}$/.test(strVal);
    if(isHashed){
      if(hashInput===strVal)setPinOk(true);
      else setPinErr("Incorrect PIN.");
    }else{
      // legacy plaintext — auto-migrate
      if(pinInput===strVal){
        await sb.from("settings").upsert({key:"expense_pin",value:hashInput,updated_at:new Date().toISOString()});
        setStoredPin(hashInput);setPinOk(true);
      }else setPinErr("Incorrect PIN.");
    }
  };

  if(pinLoading){
    return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"40dvh"}}>
      <div style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:14,padding:32,width:"100%",maxWidth:340}}>
        <Skel w={40} h={40} r={20} style={{margin:"0 auto 16px"}}/>
        <Skel w="70%" h={20} style={{margin:"0 auto 12px"}}/>
        <Skel w="100%" h={44} style={{marginBottom:12}}/>
        <Skel w="100%" h={44}/>
      </div>
    </div>);
  }

  if(!pinOk){
    const strVal=typeof storedPin==="string"?storedPin.replace(/^"|"$/g,""):storedPin;
    const isSetup=strVal==="not_set"||storedPin===null||storedPin===undefined;
    return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"60dvh"}}>
      <div style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:14,padding:"36px 28px",width:"100%",maxWidth:340,textAlign:"center"}}>
        <div style={{color:"var(--gold)",marginBottom:12,display:"flex",justifyContent:"center"}}>{I.lock}</div>
        <div className="display" style={{fontSize:24,fontWeight:600,marginBottom:4}}>{isSetup?"Set Expense PIN":"Enter PIN"}</div>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:20}}>{isSetup?"Create a PIN to protect financial data":"Expenses are PIN-protected"}</div>
        <input type="password" value={pinInput} onChange={e=>setPinInput(e.target.value)} placeholder="••••" maxLength={8} style={{...S.input,textAlign:"center",fontSize:20,letterSpacing:8,marginBottom:12}} onKeyDown={e=>e.key==="Enter"&&handlePin()}/>
        {pinErr&&<div style={{fontSize:12,color:"var(--wine)",marginBottom:12,padding:"8px 12px",background:"var(--soft-warn)",borderRadius:8,fontWeight:500}}>{pinErr}</div>}
        <button onClick={handlePin} style={{...S.btn,width:"100%"}}>{isSetup?"Set PIN":"Unlock"}</button>
      </div>
    </div>);
  }

  const total=expenses.reduce((s,e)=>s+Number(e.amount),0);
  const ym=nowYM();
  const monthTotal=expenses.filter(e=>e.date?.slice(0,7)===ym).reduce((s,e)=>s+Number(e.amount),0);
  const adSpend=expenses.filter(e=>e.category==="Marketing").reduce((s,e)=>s+Number(e.amount),0);
  const remaining=bankBalance-total;
  const months=[...new Set(expenses.map(e=>e.date?.slice(0,7)).filter(Boolean))].sort().reverse();
  const cats={};expenses.forEach(e=>{cats[e.category]=(cats[e.category]||0)+Number(e.amount);});

  let filtered=[...expenses];
  if(filterCat!=="All")filtered=filtered.filter(e=>e.category===filterCat);
  if(filterMo!=="All")filtered=filtered.filter(e=>e.date?.slice(0,7)===filterMo);
  if(search.trim())filtered=filtered.filter(e=>e.description.toLowerCase().includes(search.toLowerCase()));
  filtered.sort((a,b)=>sortDir==="desc"?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date));
  const filteredTotal=filtered.reduce((s,e)=>s+Number(e.amount),0);

  const handleAdd=async()=>{
    if(!form.date||!form.description.trim()||!form.amount)return setFE("Fill all fields.");
    if(isNaN(Number(form.amount))||Number(form.amount)<=0)return setFE("Amount must be positive.");
    setSaving(true);
    const entry={id:uid(),date:form.date,category:form.category,description:form.description,amount:Number(form.amount),created_at:new Date().toISOString()};
    const{error}=await sb.from("expenses").insert(entry);
    if(!error){
      setExpenses(prev=>[entry,...prev]);setShowModal(false);
      setForm({date:today(),category:"Marketing",description:"",amount:""});setFE("");
      flash("Expense saved.");
      logActivity("Added expense","Expenses",`${entry.description} — ${pkr(entry.amount)}`,userEmail);
    }else setFE(error.message);
    setSaving(false);
  };
  const handleDelete=async id=>{
    await sb.from("expenses").delete().eq("id",id);
    setExpenses(prev=>prev.filter(e=>e.id!==id));
    setDI(null);flash("Deleted.","warn");
  };
  const handleSaveBal=async()=>{
    const val=parseFloat(balInput);if(isNaN(val)||val<0)return;
    await sb.from("settings").upsert({key:"bank_balance",value:val,updated_at:new Date().toISOString()});
    setBankBalance(val);setEB(false);flash("Balance updated.");
  };
  const balPct=bankBalance>0?remaining/bankBalance:1;
  const balColor=remaining<0?"var(--wine)":balPct<0.2?"#b86200":"var(--green)";

  const exportCsv=()=>{
    downloadCsv(
      `vasl-expenses-${today()}.csv`,
      ["Date","Category","Description","Amount (PKR)"],
      filtered.map(e=>[e.date,e.category,e.description,e.amount])
    );
    flash("Exported.");
  };

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8,flexWrap:"wrap"}}>
      <div style={S.sec}>Expenses</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={exportCsv} style={S.btnO}>{I.download} Export CSV</button>
        <button onClick={()=>setShowModal(true)} style={S.btn}>{I.plus} Add Expense</button>
      </div>
    </div>
    <div className="grid-4 stat-cards" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:32}}>
      <SCard icon={I.spend} label="Total Spend" accent="var(--gold)"><SVal>{pkr(total)}</SVal><SSub>{expenses.length} entries</SSub></SCard>
      <SCard icon={I.cal} label="This Month" accent="var(--wine)"><SVal>{pkr(monthTotal)}</SVal><SSub>{new Date().toLocaleString("en",{month:"long",year:"numeric"})}</SSub></SCard>
      <SCard label="Ad Spend" accent="var(--gold)"><SVal>{pkr(adSpend)}</SVal><SSub>Marketing total</SSub></SCard>
      <SCard label="Bank Balance" accent={balColor}>
        {editBal?(<div style={{display:"flex",gap:4}}>
          <input type="number" value={balInput} onChange={e=>setBI(e.target.value)} style={{...S.input,width:140,padding:"8px 12px",fontSize:14,minHeight:36}} autoFocus onKeyDown={e=>e.key==="Enter"&&handleSaveBal()}/>
          <button className="touch" onClick={handleSaveBal} style={{background:"var(--green)",color:"var(--ivory)",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>{I.check}</button>
          <button className="touch" onClick={()=>setEB(false)} style={{background:"transparent",border:"1px solid var(--border)",borderRadius:6,padding:"4px 8px",cursor:"pointer",color:"var(--text3)"}}>{I.x}</button>
        </div>):(<div onClick={()=>{setEB(true);setBI(String(bankBalance));}} style={{cursor:"pointer"}}>
          <SVal style={{color:balColor}}>{pkr(remaining)}</SVal>
          <SSub>{pkr(bankBalance)} budget · click to edit</SSub>
          {remaining<0&&<div style={{marginTop:4,fontSize:10,fontWeight:600,color:"var(--wine)"}}>⚠ Over budget by {pkr(Math.abs(remaining))}</div>}
        </div>)}
      </SCard>
    </div>
    <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:20,alignItems:"start"}}>
      <div>
        <div style={S.sec}>Transactions</div>
        <div className="filter-bar" style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <select value={filterCat} onChange={e=>setFC(e.target.value)} style={S.filterSel}><option value="All">All Categories</option>{EXP_CATS.map(c=><option key={c}>{c}</option>)}</select>
          <select value={filterMo} onChange={e=>setFM(e.target.value)} style={S.filterSel}><option value="All">All Months</option>{months.map(m=><option key={m} value={m}>{new Date(m+"-01").toLocaleString("en",{month:"long",year:"numeric"})}</option>)}</select>
          <input placeholder="Search…" value={search} onChange={e=>setSrch(e.target.value)} style={{...S.filterSel,flex:1,minWidth:140}}/>
        </div>
        <div className="cardify" style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
          <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            <table style={{width:"100%",minWidth:560,borderCollapse:"collapse"}}>
              <thead><tr style={{background:"var(--wine)"}}>
                <th onClick={()=>setSD(d=>d==="desc"?"asc":"desc")} style={{...S.th,cursor:"pointer"}}>Date {sortDir==="desc"?"↓":"↑"}</th>
                <th style={S.th}>Category</th><th style={S.th}>Description</th>
                <th style={{...S.th,textAlign:"right"}}>Amount</th><th style={{...S.th,width:60}}> </th>
              </tr></thead>
              <tbody>
                {filtered.length===0?<tr><td colSpan={5} style={{padding:0}}><EmptyState msg="No expenses yet. Add your first to start tracking spend." ctaLabel="Add your first expense" onCta={()=>setShowModal(true)}/></td></tr>
                :filtered.map((e,i)=><tr key={e.id} style={{background:i%2===0?"transparent":"var(--row)"}}>
                  <td data-label="Date" style={S.td}>{fmtDate(e.date)}</td>
                  <td data-label="Category" style={S.td}><Badge label={e.category} bg={catBadge[e.category]?.bg} color={catBadge[e.category]?.text}/></td>
                  <td data-label="Description" className="td-full" style={{...S.td,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.description||"—"}</td>
                  <td data-label="Amount" style={{...S.td,textAlign:"right"}}><span className="kpi-num" style={{fontSize:16,fontWeight:600}}>{pkr(e.amount)}</span></td>
                  <td data-label="Actions" style={{...S.td,textAlign:"center"}}>
                    {deleteId===e.id
                      ?<InlineConfirm onYes={()=>handleDelete(e.id)} onNo={()=>setDI(null)}/>
                      :<button className="touch" onClick={()=>setDI(e.id)} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--text3)",opacity:0.55}}>{I.trash}</button>}
                  </td>
                </tr>)}
              </tbody>
            </table>
          </div>
          {filtered.length>0&&<div style={{padding:"12px 16px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:11,color:"var(--text3)"}}>{filtered.length} entries{(filterCat!=="All"||filterMo!=="All"||search.trim())?" · filtered":""}</span>
            <span className="kpi-num" style={{fontSize:18,fontWeight:600}}>{pkr(filteredTotal)}</span>
          </div>}
        </div>
      </div>
      <div>
        <div style={S.sec}>By Category</div>
        <div className="cat-resp" style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:12,padding:20}}>
          {EXP_CATS.filter(c=>cats[c]>0).sort((a,b)=>(cats[b]||0)-(cats[a]||0)).map(cat=>{
            const amt=cats[cat]||0;const pct=total>0?(amt/total*100).toFixed(1):0;const barW=total>0?(amt/total*100):0;
            return(<div key={cat} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:500}}>{cat}</span><span style={{fontSize:11,color:"var(--text3)"}}>{pct}%</span></div>
              <div style={{background:"var(--border)",borderRadius:4,height:4,overflow:"hidden"}}><div style={{height:"100%",width:`${barW}%`,background:catBadge[cat]?.text||"var(--gold)",borderRadius:4,transition:"width 0.4s"}}/></div>
              <div className="kpi-num" style={{fontSize:11,color:"var(--text3)",marginTop:4,textAlign:"right",fontWeight:600}}>{pkr(amt)}</div>
            </div>);
          })}
          {total>0&&<div style={{borderTop:"1px solid var(--border)",marginTop:8,paddingTop:12,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,fontWeight:600,color:"var(--text3)"}}>Total</span><span className="kpi-num" style={{fontSize:16,fontWeight:600}}>{pkr(total)}</span></div>}
        </div>
      </div>
    </div>
    <Modal open={showModal} onClose={()=>{setShowModal(false);setFE("");}} title="Add Expense" sub="Saves to Supabase">
      <FF label="Date"><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={S.input}/></FF>
      <FF label="Description"><input value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} style={S.input} placeholder="e.g. Meta ad spend — April week 2"/></FF>
      <FF label="Amount (PKR)"><input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} style={S.input} placeholder="0"/></FF>
      <FF label="Category"><select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} style={S.select}>{EXP_CATS.map(c=><option key={c}>{c}</option>)}</select></FF>
      {formErr&&<div style={{fontSize:12,color:"var(--wine)",marginBottom:12,padding:"10px 12px",background:"var(--soft-warn)",borderRadius:8,fontWeight:500}}>{formErr}</div>}
      {saving
        ?<Skel w="100%" h={44}/>
        :<button onClick={handleAdd} style={{...S.btn,width:"100%"}}>{I.sync} Save</button>}
    </Modal>
  </div>);
}

/* ── TASKS ── */
const STATUSES=["To Do","In Progress","Done"];
const PRIORITIES=["High","Medium","Low"];
const TASK_TAGS=["Content","Operations","Finance","Marketing","Logistics","Legal"];
const statusStyle={"To Do":{bg:"var(--border)",text:"var(--text)"},"In Progress":{bg:"var(--green)",text:"var(--ivory)"},Done:{bg:"var(--wine)",text:"var(--ivory)"}};
const priStyle={High:{bg:"var(--wine)",text:"var(--ivory)"},Medium:{bg:"var(--green)",text:"var(--ivory)"},Low:{bg:"var(--border)",text:"var(--text)"}};
function TasksTab({tasks,setTasks,userEmail,flash}){
  const[showForm,setSF]=useState(false);const[editTask,setET]=useState(null);
  const[search,setSrch]=useState("");const[fA,setFA]=useState("All");const[fP,setFP]=useState("All");const[activeCol,setAC]=useState("All");
  const[dueToday,setDT]=useState(false);
  const[deleteId,setDI]=useState(null);
  const blank={title:"",description:"",status:"To Do",priority:"Medium",assigned_to:"",due_date:"",tags:[],link:"",mentions:[]};
  const[form,setForm]=useState(blank);
  const openForm=t=>{if(t){setET(t);setForm({...t,tags:t.tags||[],mentions:t.mentions||[]});}else{setET(null);setForm(blank);}setSF(true);};
  const filtered=tasks.filter(t=>{
    if(fA!=="All"&&t.assigned_to!==fA)return false;
    if(fP!=="All"&&t.priority!==fP)return false;
    if(activeCol!=="All"&&t.status!==activeCol)return false;
    if(dueToday&&(t.due_date!==today()||t.status==="Done"))return false;
    if(search&&!t.title.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
  const dueTodayCount=tasks.filter(t=>t.due_date===today()&&t.status!=="Done").length;

  const saveTask=async()=>{
    if(!form.title.trim())return;
    if(editTask){
      await sb.from("tasks").update({...form}).eq("id",editTask.id);
      setTasks(prev=>prev.map(t=>t.id===editTask.id?{...t,...form}:t));
      flash("Task updated.");
      logActivity("Updated task","Tasks",form.title,userEmail);
    }else{
      const entry={...form,id:uid(),created_at:new Date().toISOString()};
      await sb.from("tasks").insert(entry);
      setTasks(prev=>[entry,...prev]);
      flash("Task created.");
      logActivity("Created task","Tasks",form.title,userEmail);
    }
    setSF(false);setET(null);
  };
  const deleteTask=async id=>{
    await sb.from("tasks").delete().eq("id",id);
    setTasks(prev=>prev.filter(t=>t.id!==id));
    setDI(null);
    flash("Deleted.","warn");
  };
  const cycleStatus=async id=>{
    const t=tasks.find(x=>x.id===id);if(!t)return;
    const next=STATUSES[(STATUSES.indexOf(t.status)+1)%STATUSES.length];
    await sb.from("tasks").update({status:next}).eq("id",id);
    setTasks(prev=>prev.map(x=>x.id===id?{...x,status:next}:x));
  };
  const toggleTag=tag=>setForm(f=>({...f,tags:f.tags.includes(tag)?f.tags.filter(x=>x!==tag):[...f.tags,tag]}));
  const toggleMention=name=>setForm(f=>({...f,mentions:f.mentions.includes(name)?f.mentions.filter(x=>x!==name):[...f.mentions,name]}));

  const Pill=({label,active,onClick,aBg,aCl})=>(
    <button className="touch" onClick={onClick} style={{padding:"8px 14px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",border:`1.5px solid ${active?(aBg||"var(--wine)"):"var(--border)"}`,background:active?(aBg||"var(--wine)"):"transparent",color:active?(aCl||"var(--ivory)"):"var(--text)",whiteSpace:"nowrap",transition:"all 0.12s"}}>{label}</button>
  );

  const TaskCard=({t})=>{
    const isOverdue=t.due_date&&t.due_date<today()&&t.status!=="Done";
    return(<div style={{background:"var(--card2)",border:`1px solid ${isOverdue?"var(--wine)":"var(--border)"}`,borderLeft:`4px solid ${isOverdue?"var(--wine)":"var(--gold)"}`,borderRadius:10,padding:"16px 16px",marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:8}}>
        <div className="display" style={{fontSize:16,fontWeight:600,lineHeight:1.3,textDecoration:t.status==="Done"?"line-through":"none",opacity:t.status==="Done"?0.5:1,cursor:"pointer"}} onClick={()=>cycleStatus(t.id)}>{t.title}</div>
        <div style={{display:"flex",gap:4,flexShrink:0,alignItems:"center"}}>
          <button className="touch" onClick={()=>openForm(t)} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--gold)"}}>{I.edit}</button>
          {deleteId===t.id
            ?<InlineConfirm onYes={()=>deleteTask(t.id)} onNo={()=>setDI(null)}/>
            :<button className="touch" onClick={()=>setDI(t.id)} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--text3)",opacity:0.55}}>{I.x}</button>}
        </div>
      </div>
      {t.description&&<div style={{fontSize:12,color:"var(--text2)",marginBottom:8,lineHeight:1.4}}>{t.description.length>80?t.description.slice(0,80)+"…":t.description}</div>}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
        <Badge label={t.priority} bg={priStyle[t.priority]?.bg} color={priStyle[t.priority]?.text}/>
        {(t.tags||[]).map(tag=><Badge key={tag} label={tag} bg="var(--border)" color="var(--text2)"/>)}
        {isOverdue&&<Badge label="Overdue" bg="var(--soft-warn)" color="var(--soft-warn-text)"/>}
        {(t.mentions||[]).map(m=><Badge key={m} label={"@"+m} bg={teamColor[m]||"var(--gold)"} color="var(--ivory)"/>)}
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Avatar name={t.assigned_to} size={24}/>
          {t.assigned_to&&<span style={{fontSize:11,fontWeight:600}}>{t.assigned_to}</span>}
          {t.due_date&&<span style={{fontSize:11,color:isOverdue?"var(--wine)":"var(--text3)",fontWeight:isOverdue?700:400}}>· {fmtShort(t.due_date)}</span>}
        </div>
        <Badge label={t.status} bg={statusStyle[t.status]?.bg} color={statusStyle[t.status]?.text}/>
      </div>
    </div>);
  };

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8,flexWrap:"wrap"}}>
      <div style={S.sec}>Task Board</div>
      <button onClick={()=>openForm(null)} style={S.btn}>{I.plus} New Task</button>
    </div>
    <input placeholder="Search tasks…" value={search} onChange={e=>setSrch(e.target.value)} style={{...S.filterSel,width:"100%",marginBottom:12,minHeight:40}}/>

    <div className="pill-row" style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text3)",minWidth:52}}>Status</span>
      {["All",...STATUSES].map(col=>{
        const cnt=col==="All"?tasks.length:tasks.filter(t=>t.status===col).length;const active=activeCol===col;
        return(<button key={col} className="touch" onClick={()=>setAC(col)} style={{padding:"8px 14px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",border:`1.5px solid ${active?"var(--wine)":"var(--border)"}`,background:active?"var(--wine)":"transparent",color:active?"var(--ivory)":"var(--text)",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
          {col}<span style={{fontSize:10,background:active?"var(--gold)":"var(--border)",color:active?"var(--noir)":"var(--text)",padding:"1px 6px",borderRadius:10,fontWeight:700}}>{cnt}</span>
        </button>);
      })}
    </div>
    <div className="pill-row" style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text3)",minWidth:52}}>Assignee</span>
      <Pill label="All" active={fA==="All"} onClick={()=>setFA("All")}/>
      {TEAM.map(name=><Pill key={name} label={name} active={fA===name} onClick={()=>setFA(name)} aBg={teamColor[name]} aCl="var(--ivory)"/>)}
    </div>
    <div className="pill-row" style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text3)",minWidth:52}}>Priority</span>
      <Pill label="All" active={fP==="All"} onClick={()=>setFP("All")}/>
      {PRIORITIES.map(p=><Pill key={p} label={p} active={fP===p} onClick={()=>setFP(p)} aBg={priStyle[p]?.bg} aCl={priStyle[p]?.text}/>)}
    </div>
    <div className="pill-row" style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text3)",minWidth:52}}>Quick</span>
      <button className="touch" onClick={()=>setDT(d=>!d)} style={{padding:"8px 14px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",border:`1.5px solid ${dueToday?"var(--gold)":"var(--border)"}`,background:dueToday?"var(--gold)":"transparent",color:dueToday?"var(--noir)":"var(--text)",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
        Due Today
        <span style={{fontSize:10,background:dueToday?"var(--wine)":"var(--border)",color:dueToday?"var(--ivory)":"var(--text)",padding:"1px 6px",borderRadius:10,fontWeight:700}}>{dueTodayCount}</span>
      </button>
    </div>

    {activeCol==="All"?(
      <div className="kanban-cols" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16}}>
        {STATUSES.map(status=>{
          const col=filtered.filter(t=>t.status===status);
          return(<div key={status}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:status==="To Do"?"var(--gold)":statusStyle[status]?.bg}}/>
              <span style={{fontSize:12,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{status}</span>
              <span style={{fontSize:11,color:"var(--text3)"}}>{col.length}</span>
            </div>
            <div style={{background:"var(--border2)",borderRadius:12,padding:12,minHeight:80,border:"1px dashed var(--border)"}}>
              {col.length===0
                ?<div style={{textAlign:"center",padding:24,color:"var(--text3)",fontSize:12}}>Empty</div>
                :col.map(t=><TaskCard key={t.id} t={t}/>)}
            </div>
          </div>);
        })}
      </div>
    ):(
      <div style={{maxWidth:600}}>
        {filtered.length===0
          ?<EmptyState msg="No tasks match your filters." ctaLabel="Add your first task" onCta={()=>openForm(null)}/>
          :filtered.map(t=><TaskCard key={t.id} t={t}/>)}
      </div>
    )}

    <Modal open={showForm} onClose={()=>{setSF(false);setET(null);}} title={editTask?"Edit Task":"New Task"} sub="Saved to Supabase">
      <FF label="Title *"><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={S.input} placeholder="What needs to be done?"/></FF>
      <div className="form-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <FF label="Assigned To"><select value={form.assigned_to} onChange={e=>setForm(f=>({...f,assigned_to:e.target.value}))} style={S.select}><option value="">—</option>{TEAM.map(t=><option key={t}>{t}</option>)}</select></FF>
        <FF label="Status"><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={S.select}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></FF>
        <FF label="Priority"><select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))} style={S.select}>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></FF>
        <FF label="Due Date"><input type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))} style={S.input}/></FF>
      </div>
      <FF label="Description"><textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} style={{...S.input,minHeight:64,resize:"vertical"}} placeholder="Notes, context…"/></FF>
      <FF label="Link"><input value={form.link} onChange={e=>setForm(f=>({...f,link:e.target.value}))} style={S.input} placeholder="https://…"/></FF>
      <FF label="Tags"><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{TASK_TAGS.map(tag=><button key={tag} className="touch" onClick={()=>toggleTag(tag)} style={{padding:"8px 12px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",border:`1.5px solid ${form.tags.includes(tag)?"var(--gold)":"var(--border)"}`,background:form.tags.includes(tag)?"var(--gold)":"transparent",color:form.tags.includes(tag)?"var(--noir)":"var(--text)"}}>{tag}</button>)}</div></FF>
      <FF label="Mention Team"><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{TEAM.map(name=><button key={name} className="touch" onClick={()=>toggleMention(name)} style={{padding:"8px 12px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",border:`1.5px solid ${form.mentions.includes(name)?teamColor[name]:"var(--border)"}`,background:form.mentions.includes(name)?teamColor[name]:"transparent",color:form.mentions.includes(name)?"var(--ivory)":"var(--text)"}}>@{name}</button>)}</div></FF>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
        <button onClick={()=>{setSF(false);setET(null);}} style={S.btnO}>Cancel</button>
        <button onClick={saveTask} style={S.btn}>Save Task</button>
      </div>
    </Modal>
  </div>);
}

/* ── ORDERS ── */
const ORDER_STATUSES=["Pending","Confirmed","Dispatched","Delivered","Returned","Cancelled"];
const ORDER_PAYMENT=["COD","Prepaid — Safepay","JazzCash","Bank Transfer"];
function OrdersTab({orders,setOrders,userEmail,flash}){
  const[showForm,setSF]=useState(false);const[editItem,setEI]=useState(null);
  const[search,setSrch]=useState("");const[fStatus,setFS]=useState("All");
  const[selected,setSelected]=useState(new Set());
  const[deleteId,setDI]=useState(null);
  const blank={customer_name:"",phone:"",city:"",product:"Vasl Box (1)",quantity:1,amount:"",payment_method:"COD",status:"Pending",tracking_number:"",notes:""};
  const[form,setForm]=useState(blank);

  const openForm=item=>{
    if(item){setEI(item);setForm({...blank,...item});}
    else{setEI(null);setForm(blank);}
    setSF(true);
  };
  const filtered=orders.filter(o=>{
    if(fStatus!=="All"&&o.status!==fStatus)return false;
    if(search){
      const s=search.toLowerCase();
      return [o.customer_name,o.phone,o.city,o.product,o.tracking_number].some(v=>String(v||"").toLowerCase().includes(s));
    }
    return true;
  });

  const saveItem=async()=>{
    if(!form.customer_name?.trim())return;
    if(editItem){
      await sb.from("orders").update(form).eq("id",editItem.id);
      setOrders(prev=>prev.map(x=>x.id===editItem.id?{...x,...form}:x));
      flash("Order updated.");
      logActivity("Updated order","Orders",form.customer_name,userEmail);
    }else{
      const entry={...form,id:uid(),created_at:new Date().toISOString()};
      await sb.from("orders").insert(entry);
      setOrders(prev=>[entry,...prev]);
      flash("Order added.");
      logActivity("Created order","Orders",form.customer_name,userEmail);
    }
    setSF(false);setEI(null);
  };
  const deleteItem=async id=>{
    await sb.from("orders").delete().eq("id",id);
    setOrders(prev=>prev.filter(x=>x.id!==id));
    setDI(null);
    setSelected(prev=>{const n=new Set(prev);n.delete(id);return n;});
    flash("Deleted.","warn");
  };

  const toggleSel=id=>{
    setSelected(prev=>{
      const n=new Set(prev);
      if(n.has(id))n.delete(id);else n.add(id);
      return n;
    });
  };
  const toggleAll=()=>{
    if(selected.size===filtered.length)setSelected(new Set());
    else setSelected(new Set(filtered.map(o=>o.id)));
  };
  const bulkUpdate=async status=>{
    const ids=Array.from(selected);
    if(!ids.length)return;
    await sb.from("orders").update({status}).in("id",ids);
    setOrders(prev=>prev.map(o=>ids.includes(o.id)?{...o,status}:o));
    setSelected(new Set());
    flash(`${ids.length} order${ids.length>1?"s":""} → ${status}.`);
    logActivity(`Bulk marked ${status}`,"Orders",`${ids.length} orders`,userEmail);
  };

  const exportCsv=()=>{
    downloadCsv(
      `vasl-orders-${today()}.csv`,
      ["Customer","Phone","City","Product","Qty","Amount","Payment","Status","Tracking","Notes","Created"],
      filtered.map(o=>[o.customer_name,o.phone,o.city,o.product,o.quantity,o.amount,o.payment_method,o.status,o.tracking_number,o.notes,o.created_at])
    );
    flash("Exported.");
  };

  const sBg=s=>s==="Delivered"?"var(--green)":s==="Cancelled"||s==="Returned"?"var(--soft-warn)":s==="Dispatched"?"rgba(191,147,62,0.22)":"rgba(191,147,62,0.14)";
  const sCl=s=>s==="Delivered"?"var(--ivory)":s==="Cancelled"||s==="Returned"?"var(--soft-warn-text)":"var(--text)";

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8,flexWrap:"wrap"}}>
      <div style={S.sec}>Orders</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button onClick={exportCsv} style={S.btnO}>{I.download} Export CSV</button>
        <button onClick={()=>openForm(null)} style={S.btn}>{I.plus} Add Order</button>
      </div>
    </div>
    <div className="filter-bar" style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
      <input placeholder="Search customer, phone, city…" value={search} onChange={e=>setSrch(e.target.value)} style={{...S.filterSel,flex:1,minWidth:160}}/>
      <select value={fStatus} onChange={e=>setFS(e.target.value)} style={S.filterSel}>
        <option value="All">All Status</option>
        {ORDER_STATUSES.map(s=><option key={s}>{s}</option>)}
      </select>
    </div>
    <div className="cardify" style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <table style={{width:"100%",minWidth:800,borderCollapse:"collapse"}}>
          <thead><tr style={{background:"var(--wine)"}}>
            <th style={{...S.th,width:40,textAlign:"center"}}>
              <input type="checkbox" checked={filtered.length>0&&selected.size===filtered.length} onChange={toggleAll} style={{cursor:"pointer",width:16,height:16,accentColor:"var(--gold)"}}/>
            </th>
            <th style={S.th}>Customer</th>
            <th style={S.th}>Phone</th>
            <th style={S.th}>City</th>
            <th style={S.th}>Product</th>
            <th style={{...S.th,textAlign:"right"}}>Amount</th>
            <th style={S.th}>Payment</th>
            <th style={S.th}>Status</th>
            <th style={{...S.th,width:80}}> </th>
          </tr></thead>
          <tbody>
            {filtered.length===0?<tr><td colSpan={9} style={{padding:0}}><EmptyState msg="No orders yet. Add your first to start the pipeline." ctaLabel="Add your first order" onCta={()=>openForm(null)}/></td></tr>
            :filtered.map((o,i)=><tr key={o.id} style={{background:selected.has(o.id)?"rgba(191,147,62,0.08)":i%2===0?"transparent":"var(--row)"}}>
              <td data-label="Select" style={{...S.td,textAlign:"center"}}>
                <input type="checkbox" checked={selected.has(o.id)} onChange={()=>toggleSel(o.id)} style={{cursor:"pointer",width:16,height:16,accentColor:"var(--gold)"}}/>
              </td>
              <td data-label="Customer" style={{...S.td,fontWeight:600}}>{o.customer_name||"—"}</td>
              <td data-label="Phone" style={S.td}>{o.phone||"—"}</td>
              <td data-label="City" style={S.td}>{o.city||"—"}</td>
              <td data-label="Product" style={S.td}>{o.product||"—"} × {o.quantity||1}</td>
              <td data-label="Amount" style={{...S.td,textAlign:"right"}}><span className="kpi-num" style={{fontSize:15,fontWeight:600}}>{pkr(o.amount)}</span></td>
              <td data-label="Payment" style={S.td}><Badge label={o.payment_method||"—"} bg="var(--border)" color="var(--text2)"/></td>
              <td data-label="Status" style={S.td}><Badge label={o.status||"Pending"} bg={sBg(o.status)} color={sCl(o.status)}/></td>
              <td data-label="Actions" style={{...S.td,textAlign:"center"}}>
                <div style={{display:"flex",gap:4,justifyContent:"center",alignItems:"center"}}>
                  <button className="touch" onClick={()=>openForm(o)} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--gold)"}}>{I.edit}</button>
                  {deleteId===o.id
                    ?<InlineConfirm onYes={()=>deleteItem(o.id)} onNo={()=>setDI(null)}/>
                    :<button className="touch" onClick={()=>setDI(o.id)} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--text3)",opacity:0.55}}>{I.trash}</button>}
                </div>
              </td>
            </tr>)}
          </tbody>
        </table>
      </div>
      {filtered.length>0&&<div style={{padding:"12px 16px",borderTop:"1px solid var(--border)",fontSize:11,color:"var(--text3)"}}>{filtered.length} {filtered.length===1?"order":"orders"}{selected.size>0?` · ${selected.size} selected`:""}</div>}
    </div>

    {selected.size>0&&<div className="bulk-bar">
      <span style={{fontSize:12,fontWeight:600}}>{selected.size} selected</span>
      <span style={{width:1,height:20,background:"rgba(191,147,62,0.3)"}}/>
      <button onClick={()=>bulkUpdate("Confirmed")} style={{background:"var(--gold)",color:"var(--noir)",border:"none",borderRadius:6,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer",minHeight:36}}>Mark Confirmed</button>
      <button onClick={()=>bulkUpdate("Dispatched")} style={{background:"transparent",color:"var(--ivory)",border:"1px solid rgba(191,147,62,0.4)",borderRadius:6,padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer",minHeight:36}}>Mark Dispatched</button>
      <button className="touch" onClick={()=>setSelected(new Set())} style={{background:"transparent",color:"rgba(245,240,230,0.7)",border:"none",cursor:"pointer",padding:4}}>{I.x}</button>
    </div>}

    <Modal open={showForm} onClose={()=>{setSF(false);setEI(null);}} title={editItem?"Edit Order":"New Order"}>
      <div className="form-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <FF label="Customer *"><input value={form.customer_name} onChange={e=>setForm(f=>({...f,customer_name:e.target.value}))} style={S.input} placeholder="Name…"/></FF>
        <FF label="Phone"><input value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} style={S.input} placeholder="+92…"/></FF>
        <FF label="City"><input value={form.city} onChange={e=>setForm(f=>({...f,city:e.target.value}))} style={S.input} placeholder="Lahore"/></FF>
        <FF label="Product"><input value={form.product} onChange={e=>setForm(f=>({...f,product:e.target.value}))} style={S.input}/></FF>
        <FF label="Quantity"><input type="number" value={form.quantity} onChange={e=>setForm(f=>({...f,quantity:e.target.value}))} style={S.input}/></FF>
        <FF label="Amount (PKR)"><input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} style={S.input} placeholder="1299"/></FF>
        <FF label="Payment"><select value={form.payment_method} onChange={e=>setForm(f=>({...f,payment_method:e.target.value}))} style={S.select}>{ORDER_PAYMENT.map(p=><option key={p}>{p}</option>)}</select></FF>
        <FF label="Status"><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={S.select}>{ORDER_STATUSES.map(s=><option key={s}>{s}</option>)}</select></FF>
      </div>
      <FF label="Tracking #"><input value={form.tracking_number} onChange={e=>setForm(f=>({...f,tracking_number:e.target.value}))} style={S.input} placeholder="LP…"/></FF>
      <FF label="Notes"><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{...S.input,minHeight:60,resize:"vertical"}}/></FF>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
        <button onClick={()=>{setSF(false);setEI(null);}} style={S.btnO}>Cancel</button>
        <button onClick={saveItem} style={S.btn}>Save Order</button>
      </div>
    </Modal>
  </div>);
}

/* ── LAUNCH ── */
const LAUNCH_CATS=[{id:"social",label:"Social Media"},{id:"video",label:"Video Content"},{id:"ai",label:"AI Characters"},{id:"shopify",label:"Shopify Website"},{id:"assets",label:"Visual Assets"},{id:"copy",label:"Copywriting"},{id:"ads",label:"Meta Ads"},{id:"ops",label:"Operations & Compliance"}];
const L_ASSIGNEES=["unassigned","bilal","rumman","sajawal"];
const L_STATUSES=["todo","inprogress","done"];
const L_LABEL={todo:"To Do",inprogress:"In Progress",done:"Done"};
const L_A_LABEL={unassigned:"— Assign",bilal:"Bilal",rumman:"Rumman",sajawal:"Sajawal"};
function LaunchTab({launchTasks,setLaunchTasks,userEmail,flash}){
  const[F,setF]=useState({assignee:"all",month:"all",status:"all",search:""});
  const[collapsed,setCol]=useState({});const[addCat,setAddCat]=useState(null);
  const[newName,setNN]=useState("");const[newMonth,setNM]=useState("M1");const[newPri,setNP]=useState("med");
  const[deleteId,setDI]=useState(null);
  const anyFilter=F.assignee!=="all"||F.month!=="all"||F.status!=="all"||F.search;
  const filterTasks=catId=>launchTasks.filter(t=>{
    if(t.category!==catId)return false;
    if(F.assignee!=="all"&&t.assignee!==F.assignee)return false;
    if(F.month!=="all"&&t.month!==F.month)return false;
    if(F.status!=="all"&&t.status!==F.status)return false;
    if(F.search&&!t.name.toLowerCase().includes(F.search.toLowerCase()))return false;
    return true;
  });
  const total=launchTasks.length;const done=launchTasks.filter(t=>t.status==="done").length;const pct=total?Math.round(done/total*100):0;
  const cycleAssignee=async id=>{
    const t=launchTasks.find(x=>x.id===id);if(!t)return;
    const next=L_ASSIGNEES[(L_ASSIGNEES.indexOf(t.assignee)+1)%L_ASSIGNEES.length];
    await sb.from("launch_tasks").update({assignee:next}).eq("id",id);
    setLaunchTasks(prev=>prev.map(x=>x.id===id?{...x,assignee:next}:x));
  };
  const cycleStatus=async id=>{
    const t=launchTasks.find(x=>x.id===id);if(!t)return;
    const next=L_STATUSES[(L_STATUSES.indexOf(t.status)+1)%L_STATUSES.length];
    await sb.from("launch_tasks").update({status:next}).eq("id",id);
    setLaunchTasks(prev=>prev.map(x=>x.id===id?{...x,status:next}:x));
  };
  const deleteTask=async id=>{
    await sb.from("launch_tasks").delete().eq("id",id);
    setLaunchTasks(prev=>prev.filter(x=>x.id!==id));
    setDI(null);
  };
  const addTask=async catId=>{
    if(!newName.trim())return;
    const entry={id:uid(),category:catId,name:newName.trim(),month:newMonth,priority:newPri,status:"todo",assignee:"unassigned",created_at:new Date().toISOString()};
    await sb.from("launch_tasks").insert(entry);
    setLaunchTasks(prev=>[...prev,entry]);
    setAddCat(null);setNN("");flash("Task added.");
  };
  const FBtn=({f,v,label})=><button className="touch" onClick={()=>setF(p=>({...p,[f]:v}))} style={{background:F[f]===v?"rgba(191,147,62,0.15)":"transparent",border:"1px solid "+(F[f]===v?"var(--gold)":"var(--border)"),borderRadius:6,padding:"6px 12px",fontSize:11,color:F[f]===v?"var(--gold)":"var(--text2)",cursor:"pointer",whiteSpace:"nowrap"}}>{label||v}</button>;
  const monthBg={M1:"rgba(191,147,62,0.15)",M2:"rgba(28,74,53,0.2)",M3:"var(--border)"};
  const monthColor={M1:"var(--gold)",M2:"var(--green)",M3:"var(--text3)"};
  const priDot={high:"var(--wine)",med:"var(--gold)",low:"var(--text3)"};
  const aBg={bilal:"var(--gold)",rumman:"var(--wine)",sajawal:"var(--green)",unassigned:"transparent"};
  const aColor={bilal:"var(--noir)",rumman:"var(--ivory)",sajawal:"var(--ivory)",unassigned:"var(--text3)"};
  const sBg={todo:"transparent",inprogress:"rgba(191,147,62,0.12)",done:"rgba(28,74,53,0.2)"};
  const sColor={todo:"var(--text3)",inprogress:"var(--gold)",done:"var(--green)"};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,gap:8,flexWrap:"wrap"}}>
      <div style={S.sec}>90-Day Launch Board</div>
      <div style={{display:"flex",gap:20,alignItems:"center"}}>
        {[["Total",total],["Done",done],["%",pct+"%"]].map(([l,v])=><div key={l} style={{textAlign:"center"}}><div className="kpi-num" style={{fontSize:20,fontWeight:600,color:l==="Done"?"var(--green)":"var(--text)"}}>{v}</div><div style={{fontSize:9,letterSpacing:1,textTransform:"uppercase",color:"var(--text3)"}}>{l}</div></div>)}
      </div>
    </div>
    <div style={{height:4,background:"var(--border)",borderRadius:2,marginBottom:16}}><div style={{height:"100%",background:"var(--gold)",borderRadius:2,width:pct+"%",transition:"width 0.4s"}}/></div>
    <div className="filter-bar" style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text3)"}}>Assignee</span>
      <FBtn f="assignee" v="all" label="All"/>
      {L_ASSIGNEES.filter(a=>a!=="unassigned").map(a=><FBtn key={a} f="assignee" v={a} label={L_A_LABEL[a]}/>)}
      <FBtn f="assignee" v="unassigned" label="Unassigned"/>
      <span style={{width:1,height:20,background:"var(--border)",margin:"0 4px"}}/>
      <span style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text3)"}}>Month</span>
      <FBtn f="month" v="all" label="All"/><FBtn f="month" v="M1"/><FBtn f="month" v="M2"/><FBtn f="month" v="M3"/>
      <span style={{width:1,height:20,background:"var(--border)",margin:"0 4px"}}/>
      <span style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text3)"}}>Status</span>
      <FBtn f="status" v="all" label="All"/><FBtn f="status" v="todo" label="To Do"/><FBtn f="status" v="inprogress" label="In Prog"/><FBtn f="status" v="done" label="Done"/>
      <input placeholder="Search…" value={F.search} onChange={e=>setF(p=>({...p,search:e.target.value}))} style={{...S.filterSel,minWidth:140,flex:1,marginLeft:"auto"}}/>
    </div>
    {LAUNCH_CATS.map(cat=>{
      const vis=filterTasks(cat.id);const all=launchTasks.filter(t=>t.category===cat.id);const catDone=all.filter(t=>t.status==="done").length;const isCollapsed=collapsed[cat.id]&&!anyFilter;
      return(<div key={cat.id} style={{marginBottom:4}}>
        <div onClick={()=>setCol(p=>({...p,[cat.id]:!p[cat.id]}))} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",background:"var(--wine)",borderLeft:"3px solid var(--gold)",cursor:"pointer",userSelect:"none"}}>
          <span style={{color:"rgba(191,147,62,0.5)",fontSize:10,width:12,transition:"transform 0.2s",transform:isCollapsed?"rotate(0deg)":"rotate(90deg)",display:"inline-block"}}>▶</span>
          <span className="display" style={{fontSize:13,letterSpacing:2,textTransform:"uppercase",color:"var(--gold)",flex:1,fontWeight:600}}>{cat.label}</span>
          {catDone>0&&<span style={{fontSize:10,color:"var(--green)"}}>{catDone}/{all.length}</span>}
          <span style={{fontSize:10,color:"rgba(245,240,230,0.4)",background:"rgba(245,240,230,0.08)",borderRadius:12,padding:"2px 10px"}}>{anyFilter?vis.length+"/"+all.length:all.length}</span>
        </div>
        {!isCollapsed&&<div>
          {vis.length===0
            ?<div style={{padding:"16px 28px",color:"var(--text3)",fontSize:12}}>{anyFilter?"No matches.":"Empty."}</div>
            :<div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}><table style={{width:"100%",minWidth:520,borderCollapse:"collapse"}}>
              <tbody>{vis.map(t=><tr key={t.id} style={{borderBottom:"1px solid var(--border2)",background:t.status==="done"?"rgba(28,74,53,0.03)":"transparent"}}>
                <td style={{...S.td,paddingLeft:28,opacity:t.status==="done"?0.5:1,textDecoration:t.status==="done"?"line-through":"none"}}>{t.name}</td>
                <td style={{...S.td,width:52,textAlign:"center"}}><span style={{fontSize:9,fontWeight:700,letterSpacing:1,padding:"4px 8px",borderRadius:4,background:monthBg[t.month],color:monthColor[t.month]}}>{t.month}</span></td>
                <td style={{...S.td,width:32,textAlign:"center"}}><span style={{width:8,height:8,borderRadius:"50%",background:priDot[t.priority],display:"inline-block"}}/></td>
                <td style={{...S.td,width:104}}><button className="touch" onClick={()=>cycleAssignee(t.id)} style={{display:"inline-block",padding:"4px 12px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",border:t.assignee==="unassigned"?"1px dashed var(--border)":"none",background:aBg[t.assignee],color:aColor[t.assignee]}}>{L_A_LABEL[t.assignee]}</button></td>
                <td style={{...S.td,width:96}}><button className="touch" onClick={()=>cycleStatus(t.id)} style={{display:"inline-block",padding:"4px 12px",borderRadius:6,fontSize:11,cursor:"pointer",border:`1px solid ${sColor[t.status]}`,background:sBg[t.status],color:sColor[t.status]}}>{L_LABEL[t.status]}</button></td>
                <td style={{...S.td,width:100,textAlign:"center"}}>
                  {deleteId===t.id
                    ?<InlineConfirm onYes={()=>deleteTask(t.id)} onNo={()=>setDI(null)}/>
                    :<button className="touch" onClick={()=>setDI(t.id)} style={{background:"transparent",border:"none",color:"var(--text3)",cursor:"pointer",opacity:0.4,fontSize:14}}>×</button>}
                </td>
              </tr>)}</tbody>
            </table></div>}
          {addCat===cat.id
            ?<div style={{display:"flex",gap:6,padding:"12px 28px",background:"var(--row)",alignItems:"center",flexWrap:"wrap"}}>
              <input value={newName} onChange={e=>setNN(e.target.value)} placeholder="Task name…" style={{...S.filterSel,flex:1,minWidth:160}} autoFocus onKeyDown={e=>{if(e.key==="Enter")addTask(cat.id);if(e.key==="Escape")setAddCat(null);}}/>
              <select value={newMonth} onChange={e=>setNM(e.target.value)} style={S.filterSel}><option>M1</option><option>M2</option><option>M3</option></select>
              <select value={newPri} onChange={e=>setNP(e.target.value)} style={S.filterSel}><option value="high">High</option><option value="med">Med</option><option value="low">Low</option></select>
              <button onClick={()=>addTask(cat.id)} style={{...S.btn,padding:"8px 16px",fontSize:12,minHeight:32}}>Add</button>
              <button onClick={()=>setAddCat(null)} style={{...S.btnO,padding:"8px 14px",fontSize:12,minHeight:32}}>Cancel</button>
            </div>
            :<div style={{padding:"8px 28px"}}><button onClick={()=>setAddCat(cat.id)} style={{background:"transparent",border:"1px dashed rgba(191,147,62,0.25)",color:"rgba(191,147,62,0.5)",borderRadius:6,padding:"8px 16px",fontSize:11,cursor:"pointer",minHeight:32}}>+ Add task</button></div>}
        </div>}
      </div>);
    })}
  </div>);
}

/* ── CALENDAR ── */
const CAL_PLATFORMS=["Instagram","TikTok","Facebook","YouTube","WhatsApp","Other"];
const CAL_TYPES=["Reel","Static Post","Story","Carousel","Video","Broadcast","Other"];
const CAL_STATUSES=["Planned","In Production","Ready","Published"];
function CalendarTab({events,setEvents,userEmail,flash}){
  const[currentMonth,setCM]=useState(new Date());
  const[showForm,setSF]=useState(false);const[editEvent,setEE]=useState(null);
  const[imageFile,setIF]=useState(null);const[imgUploading,setIU]=useState(false);const[imgErr,setImgErr]=useState("");
  const fileRef=useRef(null);
  const[view,setView]=useState(()=>localStorage.getItem("vasl_cal_view")||"grid");
  const[deleteId,setDI]=useState(null);
  useEffect(()=>{localStorage.setItem("vasl_cal_view",view);},[view]);

  const blank={title:"",date:"",platform:"Instagram",content_type:"Reel",status:"Planned",assigned_to:"",notes:"",link:"",image_url:""};
  const[form,setForm]=useState(blank);
  const year=currentMonth.getFullYear();const month=currentMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();
  const monthLabel=currentMonth.toLocaleString("en",{month:"long",year:"numeric"});
  const days=[];for(let i=0;i<firstDay;i++)days.push(null);for(let i=1;i<=daysInMonth;i++)days.push(i);
  const getDateStr=d=>`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  const openForm=(date,evt)=>{
    setIF(null);setImgErr("");
    if(evt){setEE(evt);setForm({title:evt.title||"",date:evt.date||"",platform:evt.platform||"Instagram",content_type:evt.content_type||"Reel",status:evt.status||"Planned",assigned_to:evt.assigned_to||"",notes:evt.notes||"",link:evt.link||"",image_url:evt.image_url||""});}
    else{setEE(null);setForm({...blank,date:date||today()});}
    setSF(true);
  };

  const handleFile=f=>{
    if(!f){setIF(null);setImgErr("");return;}
    const err=validateUpload(f);
    if(err){setImgErr(err);setIF(null);return;}
    setImgErr("");setIF(f);
  };

  const saveEvent=async()=>{
    if(!form.title.trim()||!form.date)return;
    let ff={...form};
    if(imageFile){
      setIU(true);
      try{const url=await uploadToCloudinary(imageFile);ff.image_url=url;}
      catch(e){setImgErr(e.message||"Upload failed.");setIU(false);return;}
      setIU(false);
    }
    if(editEvent){
      await sb.from("calendar_events").update(ff).eq("id",editEvent.id);
      setEvents(prev=>prev.map(x=>x.id===editEvent.id?{...x,...ff}:x));
      flash("Event updated.");
    }else{
      const entry={...ff,id:uid(),created_at:new Date().toISOString()};
      await sb.from("calendar_events").insert(entry);
      setEvents(prev=>[entry,...prev]);
      flash("Event added.");
      logActivity("Added calendar event","Calendar",ff.title,userEmail);
    }
    setSF(false);setEE(null);setIF(null);setImgErr("");
  };

  const deleteEvent=async id=>{
    await sb.from("calendar_events").delete().eq("id",id);
    setEvents(prev=>prev.filter(x=>x.id!==id));
    setDI(null);
    flash("Deleted.","warn");
  };

  const platColor={Instagram:"#bf933e",TikTok:"#1c4a35",Facebook:"#3c060d",YouTube:"var(--wine)",WhatsApp:"var(--green)",Other:"rgba(191,147,62,0.5)"};
  const monthEvents=events.filter(e=>e.date?.slice(0,7)===`${year}-${String(month+1).padStart(2,"0")}`).sort((a,b)=>a.date.localeCompare(b.date));

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8,flexWrap:"wrap"}}>
      <div style={S.sec}>Content Calendar</div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:0,border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
          <button className="touch" onClick={()=>setView("grid")} style={{background:view==="grid"?"var(--gold)":"transparent",color:view==="grid"?"var(--noir)":"var(--text2)",border:"none",padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>{I.grid} Grid</button>
          <button className="touch" onClick={()=>setView("list")} style={{background:view==="list"?"var(--gold)":"transparent",color:view==="list"?"var(--noir)":"var(--text2)",border:"none",padding:"8px 14px",fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>{I.list} List</button>
        </div>
        <button onClick={()=>openForm(today(),null)} style={S.btn}>{I.plus} Add Event</button>
      </div>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <button onClick={()=>setCM(new Date(year,month-1,1))} style={S.btnO}>← Prev</button>
      <div className="display" style={{fontSize:24,fontWeight:600}}>{monthLabel}</div>
      <button onClick={()=>setCM(new Date(year,month+1,1))} style={S.btnO}>Next →</button>
    </div>

    {view==="grid"?(
      <div className="cal-grid" style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:8,textAlign:"center",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1,color:"var(--text3)"}}>{d}</div>)}
        {days.map((d,i)=>{
          if(d===null)return <div key={"e"+i}/>;
          const dateStr=getDateStr(d);const dayEvents=events.filter(e=>e.date===dateStr);const isToday=dateStr===today();
          return(<div key={d} onClick={()=>{if(dayEvents.length===0)openForm(dateStr,null);}} style={{background:isToday?"rgba(191,147,62,0.12)":"var(--card2)",border:`1px solid ${isToday?"var(--gold)":"var(--border)"}`,borderRadius:8,padding:8,minHeight:80,cursor:"pointer",transition:"background 0.15s"}}>
            <div style={{fontSize:12,fontWeight:isToday?700:500,color:isToday?"var(--gold)":"var(--text)",marginBottom:4}}>{d}</div>
            {dayEvents.slice(0,3).map(ev=><div key={ev.id} style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
              {ev.image_url&&<div style={{width:5,height:5,borderRadius:"50%",background:"var(--gold)",flexShrink:0}}/>}
              <div onClick={e=>{e.stopPropagation();openForm(null,ev);}} style={{fontSize:9,padding:"2px 4px",borderRadius:3,background:platColor[ev.platform]||"var(--gold)",color:"var(--ivory)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer",flex:1}}>{ev.title}</div>
            </div>)}
            {dayEvents.length>3&&<div style={{fontSize:9,color:"var(--text3)"}}>+{dayEvents.length-3} more</div>}
          </div>);
        })}
      </div>
    ):(
      <div style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
        {monthEvents.length===0
          ?<EmptyState msg={`No events planned for ${monthLabel}.`} ctaLabel="Add your first event" onCta={()=>openForm(getDateStr(1),null)}/>
          :monthEvents.map((ev,i)=><div key={ev.id} onClick={()=>openForm(null,ev)} style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px",borderBottom:i<monthEvents.length-1?"1px solid var(--border2)":"none",cursor:"pointer",background:ev.date===today()?"rgba(191,147,62,0.08)":"transparent"}}>
            <div style={{minWidth:56,textAlign:"center"}}>
              <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:"var(--text3)",fontWeight:600}}>{new Date(ev.date+"T00:00:00").toLocaleDateString("en",{weekday:"short"})}</div>
              <div className="kpi-num" style={{fontSize:22,fontWeight:600,lineHeight:1.1}}>{Number(ev.date.slice(-2))}</div>
            </div>
            <div style={{width:3,height:40,borderRadius:2,background:platColor[ev.platform]||"var(--gold)"}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.title}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                <Badge label={ev.platform} bg={platColor[ev.platform]} color="var(--ivory)"/>
                <Badge label={ev.content_type} bg="var(--border)" color="var(--text2)"/>
                <Badge label={ev.status} bg={ev.status==="Published"?"var(--green)":"var(--soft-warn)"} color={ev.status==="Published"?"var(--ivory)":"var(--soft-warn-text)"}/>
              </div>
            </div>
          </div>)}
      </div>
    )}

    <Modal open={showForm} onClose={()=>{setSF(false);setEE(null);setIF(null);setImgErr("");}} title={editEvent?"Edit Event":"New Event"} width={480}>
      <FF label="Title *"><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={S.input} placeholder="Post title…"/></FF>
      <div className="form-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <FF label="Date"><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={S.input}/></FF>
        <FF label="Platform"><select value={form.platform} onChange={e=>setForm(f=>({...f,platform:e.target.value}))} style={S.select}>{CAL_PLATFORMS.map(p=><option key={p}>{p}</option>)}</select></FF>
        <FF label="Type"><select value={form.content_type} onChange={e=>setForm(f=>({...f,content_type:e.target.value}))} style={S.select}>{CAL_TYPES.map(t=><option key={t}>{t}</option>)}</select></FF>
        <FF label="Status"><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={S.select}>{CAL_STATUSES.map(s=><option key={s}>{s}</option>)}</select></FF>
        <FF label="Assigned To"><select value={form.assigned_to} onChange={e=>setForm(f=>({...f,assigned_to:e.target.value}))} style={S.select}><option value="">—</option>{TEAM.map(t=><option key={t}>{t}</option>)}</select></FF>
      </div>
      <FF label="Notes"><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{...S.input,minHeight:56,resize:"vertical"}}/></FF>
      <FF label="Link"><input value={form.link} onChange={e=>setForm(f=>({...f,link:e.target.value}))} style={S.input} placeholder="https://…"/></FF>
      <FF label="Image (optional · max 5MB)">
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {form.image_url&&!imageFile&&<div style={{position:"relative"}}>
            <img src={form.image_url} alt="event" style={{width:"100%",maxHeight:120,objectFit:"cover",borderRadius:8,border:"1px solid var(--border)"}}/>
            <button className="touch" onClick={()=>setForm(f=>({...f,image_url:""}))} style={{position:"absolute",top:4,right:4,background:"rgba(17,5,9,0.6)",border:"none",borderRadius:"50%",width:28,height:28,cursor:"pointer",color:"var(--ivory)",display:"flex",alignItems:"center",justifyContent:"center"}}>{I.x}</button>
          </div>}
          {imageFile&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"var(--border2)",borderRadius:8}}>
            <span style={{color:"var(--gold)"}}>{I.img}</span>
            <span style={{fontSize:12,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{imageFile.name}</span>
            <button className="touch" onClick={()=>handleFile(null)} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--text3)"}}>{I.x}</button>
          </div>}
          {imgErr&&<div style={{fontSize:12,color:"var(--wine)",padding:"8px 12px",background:"var(--soft-warn)",borderRadius:8,fontWeight:500}}>{imgErr}</div>}
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
          <button onClick={()=>fileRef.current.click()} style={{...S.btnO,fontSize:12}}>{I.img} {imageFile||form.image_url?"Change Image":"Upload Image"}</button>
        </div>
      </FF>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8,alignItems:"center"}}>
        {editEvent&&(deleteId===editEvent.id
          ?<div style={{marginRight:"auto"}}><InlineConfirm onYes={()=>{deleteEvent(editEvent.id);setSF(false);}} onNo={()=>setDI(null)}/></div>
          :<button onClick={()=>setDI(editEvent.id)} style={{...S.btnO,color:"var(--wine)",borderColor:"var(--wine)",marginRight:"auto"}}>Delete</button>)}
        <button onClick={()=>{setSF(false);setEE(null);setIF(null);setImgErr("");}} style={S.btnO}>Cancel</button>
        {imgUploading
          ?<Skel w={120} h={40}/>
          :<button onClick={saveEvent} style={S.btn}>Save</button>}
      </div>
    </Modal>
  </div>);
}

/* ── ACTIVITY LOG ── */
function ActivityLog({open,onClose}){
  const[logs,setLogs]=useState([]);const[loading,setLoad]=useState(false);
  useEffect(()=>{
    if(!open)return;
    setLoad(true);
    sb.from("activity_log").select("*").order("created_at",{ascending:false}).limit(50).then(({data})=>{setLogs(data||[]);setLoad(false);});
  },[open]);
  useEffect(()=>{
    if(open){document.body.classList.add("lock");}else{document.body.classList.remove("lock");}
    return()=>document.body.classList.remove("lock");
  },[open]);
  if(!open)return null;
  return(<div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(17,5,9,0.5)",backdropFilter:"blur(4px)",zIndex:200,display:"flex",justifyContent:"flex-end"}}>
    <div style={{width:400,maxWidth:"100vw",background:"var(--card2)",borderLeft:"1px solid var(--border)",height:"100dvh",overflowY:"auto",padding:"24px 20px",animation:"fadeIn 0.2s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div className="display" style={{fontSize:22,fontWeight:600}}>Activity Log</div>
        <button className="touch" onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",color:"var(--text3)"}}>{I.x}</button>
      </div>
      {loading
        ?<div style={{display:"flex",flexDirection:"column",gap:8}}>{Array.from({length:6}).map((_,i)=><SkelRow key={i}/>)}</div>
        :logs.length===0
          ?<EmptyState msg="No activity yet."/>
          :logs.map(log=><div key={log.id} style={{padding:"12px 0",borderBottom:"1px solid var(--border2)"}}>
            <div style={{fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:6}}><Badge label={log.module} bg="var(--border)" color="var(--text2)"/> {log.action}</div>
            {log.detail&&<div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>{log.detail}</div>}
            <div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>{new Date(log.created_at).toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})} · {log.user_email}</div>
          </div>)}
    </div>
  </div>);
}

  a("social","Instagram account setup and bio","M1","high");a("social","Facebook Page setup and bio","M1","high");a("social","TikTok account setup and bio","M1","high");a("social","YouTube channel setup and bio","M1","med");a("social","Instagram Highlights creation","M1","med");a("social","30-post grid layout plan","M1","high");a("social","Canva brand kit setup","M1","high");a("social","Story template set — 5 variants","M1","med");a("social","Content calendar — Month 1","M1","high");a("social","Content calendar — Month 2","M2","high");a("social","Content calendar — Month 3","M3","high");
  a("video","Reel concept list — Month 1","M1","high");a("video","Reel concept list — Month 2","M2","med");a("video","Video editing — Month 1 Reels","M1","high");a("video","YouTube Shorts upload schedule","M1","med");
  a("ai","Hakim character visual brief","M1","high");a("ai","Hakim video scripts — Month 1","M1","high");a("ai","Hakim video production — Month 1","M1","high");
