*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

  --ivory: #F2E8D5; --green: #1C4A35;
  --gold20: rgba(196,151,63,0.2); --gold40: rgba(196,151,63,0.4);

html, body { height: 100%; background: var(--noir); color: var(--ivory); font-family: -apple-system,'Segoe UI',system-ui,sans-serif; font-size: 13px; }
#app { display: flex; flex-direction: column; height: 100vh; }

/* LOADER OVERLAY */
#loader { position: fixed; inset: 0; background: var(--noir); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity 0.3s; }
#loader.hidden { opacity: 0; pointer-events: none; }
.loader-brand { font-family: Georgia,'Palatino Linotype',serif; font-size: 28px; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; }
.loader-sub { font-size: 11px; letter-spacing: 2px; color: var(--ivory30); text-transform: uppercase; }
.loader-bar { width: 160px; height: 1px; background: var(--gold20); border-radius: 1px; overflow: hidden; }
.loader-fill { height: 100%; background: var(--gold); border-radius: 1px; animation: lbar 1.6s ease-in-out infinite; }
@keyframes lbar { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
.loader-msg { font-size: 11px; color: var(--ivory30); letter-spacing: 1px; }

/* HEADER */
.header { background: var(--wine); border-bottom: 1px solid var(--gold40); padding: 14px 24px 12px; flex-shrink: 0; }
.header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
.brand-name { font-family: Georgia,'Palatino Linotype',serif; font-size: 22px; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; }
.brand-sub { font-size: 10px; letter-spacing: 2.5px; color: var(--ivory60); text-transform: uppercase; margin-top: 4px; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.stats-row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.stat { text-align: center; min-width: 52px; }
.stat-n { font-family: Georgia,serif; font-size: 22px; color: var(--gold); display: block; line-height: 1; }
.stat-n.red { color: #cc7777; }
.stat-n.gn { color: #6aaa88; }
.stat-l { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ivory30); margin-top: 3px; display: block; }
.progress-wrap { height: 2px; background: var(--gold20); border-radius: 1px; }
.progress-fill { height: 100%; background: var(--gold); border-radius: 1px; transition: width 0.4s; }
.sync-row { display: flex; align-items: center; gap: 8px; }
.sync-status { font-size: 10px; letter-spacing: 1px; color: var(--ivory30); }
.sync-status.saving { color: var(--gold); }
.sync-status.saved { color: #6aaa88; }
.sync-status.error { color: #cc7777; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ivory30); flex-shrink: 0; transition: background 0.3s; }
.sync-dot.saving { background: var(--gold); animation: pulse 0.8s ease-in-out infinite; }
.sync-dot.saved { background: #6aaa88; }
.sync-dot.error { background: #cc7777; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* FILTERS */
.filters { background: #160710; border-bottom: 1px solid rgba(196,151,63,0.1); padding: 8px 24px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
.filter-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(242,232,213,0.3); white-space: nowrap; }
.fdivider { width: 1px; height: 18px; background: rgba(242,232,213,0.1); margin: 0 4px; flex-shrink: 0; }
.fbtn { background: transparent; border: 0.5px solid rgba(242,232,213,0.18); color: rgba(242,232,213,0.5); border-radius: 4px; padding: 3px 10px; font-size: 11px; cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap; }
.fbtn:hover { border-color: var(--gold); color: var(--ivory); }
.fbtn.active { background: rgba(196,151,63,0.15); border-color: var(--gold); color: var(--gold); }
.search { background: rgba(242,232,213,0.04); border: 0.5px solid rgba(242,232,213,0.14); border-radius: 4px; color: var(--ivory); font-size: 11px; padding: 4px 10px; font-family: inherit; width: 180px; outline: none; }
.search:focus { border-color: var(--gold40); }
.search::placeholder { color: rgba(242,232,213,0.22); }
.ml-auto { margin-left: auto; }
.reset-btn { background: transparent; border: 0.5px solid rgba(242,232,213,0.12); color: rgba(242,232,213,0.25); border-radius: 4px; padding: 3px 10px; font-size: 10px; cursor: pointer; font-family: inherit; letter-spacing: 0.5px; }
.reset-btn:hover { border-color: rgba(200,80,80,0.5); color: rgba(200,80,80,0.7); }

/* SCROLL AREA */
.scroll-area { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(196,151,63,0.25) transparent; }
.scroll-area::-webkit-scrollbar { width: 4px; }
.scroll-area::-webkit-scrollbar-track { background: transparent; }
.scroll-area::-webkit-scrollbar-thumb { background: rgba(196,151,63,0.25); border-radius: 2px; }

/* CATEGORY */
.cat-section { }
.cat-header { display: flex; align-items: center; gap: 10px; padding: 9px 24px; background: var(--wine); border-left: 3px solid var(--gold); cursor: pointer; user-select: none; }
.cat-header:hover { background: #3a0e1a; }
.cat-arrow { color: rgba(196,151,63,0.5); font-size: 10px; width: 10px; transition: transform 0.2s; display: inline-block; }

.cat-label { font-family: Georgia,serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); flex: 1; }
.cat-meta { display: flex; gap: 8px; align-items: center; }
.cat-count { font-size: 10px; color: var(--ivory30); background: rgba(242,232,213,0.06); border-radius: 10px; padding: 1px 8px; }
.cat-done { font-size: 10px; color: #6aaa88; }

/* TABLE */
.task-table { width: 100%; border-collapse: collapse; }
.task-row { border-bottom: 1px solid rgba(242,232,213,0.035); transition: background 0.12s; }
.task-row:nth-child(even) { background: rgba(45,11,20,0.18); }
.task-row:hover { background: rgba(45,11,20,0.55); }
.task-row.is-done .task-name { text-decoration: line-through; color: var(--ivory30); }
td { padding: 7px 8px; vertical-align: middle; }
td:first-child { padding-left: 28px; }
td:last-child { padding-right: 14px; }
.task-name { font-size: 12.5px; color: var(--ivory); line-height: 1.4; }

.month-b.M3 { background: rgba(242,232,213,0.06); color: var(--ivory30); border: 0.5px solid rgba(242,232,213,0.12); }

.pri-dot.high { background: #cc5555; }
.pri-dot.med { background: var(--gold); }
.pri-dot.low { background: rgba(242,232,213,0.2); }

.assignee-btn { display: inline-block; padding: 3px 11px; border-radius: 4px; font-size: 11px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; border: none; font-family: inherit; letter-spacing: 0.3px; }

.assignee-btn.unassigned { background: transparent; color: rgba(242,232,213,0.28); border: 0.5px dashed rgba(242,232,213,0.18); }

.status-btn { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; white-space: nowrap; border: none; font-family: inherit; transition: opacity 0.15s; }

async function loadFromBin(){
  setLoader('Loading tasks from cloud...');
  try {
    const res = await fetch(BIN_URL+'/latest', {
      headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' }
    });
    if(!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if(!data.initialized || !data.tasks || data.tasks.length===0){
      setLoader('First launch — setting up tasks...');
      tasks = defaults();
      await saveToBin(true);
    } else {
      tasks = data.tasks;
    }
    setSyncUI('saved','All changes saved');
  } catch(e) {
    setLoader('Could not reach sync — using local fallback');
    try { const d=localStorage.getItem('vasl-fallback'); if(d) tasks=JSON.parse(d); else tasks=defaults(); }
    catch(_){ tasks=defaults(); }
    setSyncUI('error','Offline — changes saved locally');
    showToast('Could not reach sync server. Changes saved locally only.', 4000);
  }
  hideLoader();
  updateHeader();
  render();
}

async function saveToBin(silent=false){
  if(!silent) setSyncUI('saving','Saving...');
  try {
    const res = await fetch(BIN_URL, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ initialized: true, tasks })
    });
    if(!res.ok) throw new Error('save failed');
    if(!silent){ setSyncUI('saved','All changes saved'); showToast('Saved ✓'); }
    try { localStorage.setItem('vasl-fallback', JSON.stringify(tasks)); } catch(_){}
  } catch(e){
    setSyncUI('error','Save failed — retrying...');
    try { localStorage.setItem('vasl-fallback', JSON.stringify(tasks)); } catch(_){}
    setTimeout(()=>saveToBin(silent), 4000);
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  setSyncUI('saving','Saving...');
  saveTimer = setTimeout(()=>saveToBin(), 1200);
}

function updateHeader(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='done').length;
  const unassigned=tasks.filter(t=>t.assignee==='unassigned').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><span class="stat-n">${total}</span><span class="stat-l">Total</span></div>
    <div class="stat"><span class="stat-n">${total-unassigned}</span><span class="stat-l">Assigned</span></div>
    <div class="stat"><span class="stat-n red">${unassigned}</span><span class="stat-l">Unassigned</span></div>
    <div class="stat"><span class="stat-n gn">${done}</span><span class="stat-l">Done</span></div>
    <div class="stat"><span class="stat-n">${pct}%</span><span class="stat-l">Complete</span></div>`;
  document.getElementById('pbar').style.width=pct+'%';
}

function filteredTasks(catId){
  return tasks.filter(t=>{
    if(t.category!==catId) return false;
    if(F.assignee!=='all'&&t.assignee!==F.assignee) return false;
    if(F.month!=='all'&&t.month!==F.month) return false;
    if(F.status!=='all'&&t.status!==F.status) return false;
    if(F.search&&!t.name.toLowerCase().includes(F.search.toLowerCase())) return false;
    return true;
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const anyF=F.assignee!=='all'||F.month!=='all'||F.status!=='all'||F.search;
  let h='';
  CATS.forEach(cat=>{
    const vis=filteredTasks(cat.id);
    const all=tasks.filter(t=>t.category===cat.id);
    const doneCount=all.filter(t=>t.status==='done').length;
    const col=collapsed[cat.id]&&!anyF;
    const formOpen=activeForm===cat.id;
    h+=`<div class="cat-section">`;
    h+=`<div class="cat-header" data-cat="${cat.id}">
      <span class="cat-arrow ${!col?'open':''}">&#9654;</span>
      <span class="cat-label">${cat.label}</span>
      <span class="cat-meta">
        ${doneCount>0?`<span class="cat-done">${doneCount}/${all.length} done</span>`:''}
        <span class="cat-count">${anyF?vis.length+' of '+all.length:all.length+' tasks'}</span>
      </span>
    </div>`;
    if(!col){
      if(vis.length===0){
        h+=`<div class="empty">${anyF?'No tasks match current filters.':'No tasks yet.'}</div>`;
      } else {
        h+=`<table class="task-table"><tbody>`;
        vis.forEach(t=>{
          h+=`<tr class="task-row${t.status==='done'?' is-done':''}" data-id="${t.id}">
            <td><span class="task-name">${esc(t.name)}</span></td>
            <td class="col-m"><span class="month-b ${t.month}">${t.month}</span></td>
            <td class="col-p"><span class="pri-dot ${t.priority}" title="${t.priority}"></span></td>
            <td class="col-a"><button class="assignee-btn ${t.assignee}" data-action="a" data-id="${t.id}">${A_LABEL[t.assignee]}</button></td>
            <td class="col-s"><button class="status-btn ${t.status}" data-action="s" data-id="${t.id}">${S_LABEL[t.status]}</button></td>
            <td class="col-d"><button class="del-btn" data-action="d" data-id="${t.id}">&times;</button></td>
          </tr>`;
        });
        h+=`</tbody></table>`;
      }
      if(formOpen){
        h+=`<div class="add-form">
          <input type="text" id="newName" placeholder="Task name..." maxlength="140">
          <select id="newMonth"><option value="M1">M1</option><option value="M2">M2</option><option value="M3">M3</option></select>
          <select id="newPri"><option value="high">High</option><option value="med">Med</option><option value="low">Low</option></select>
          <button class="btn-confirm" data-action="ok" data-cat="${cat.id}">Add task</button>
          <button class="btn-cancel" data-action="cx">Cancel</button>
        </div>`;
      } else {
        h+=`<div class="add-row"><button class="add-trigger" data-action="of" data-cat="${cat.id}">+ Add task</button></div>`;
      }
    }
    h+=`</div>`;
  });
  document.getElementById('content').innerHTML=h;
  if(activeForm){const i=document.getElementById('newName');if(i)i.focus();}
}

document.getElementById('content').addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn){
    const hdr=e.target.closest('.cat-header');
    if(hdr){collapsed[hdr.dataset.cat]=!collapsed[hdr.dataset.cat];render();}
    return;
  }
  const ac=btn.dataset.action, id=btn.dataset.id?+btn.dataset.id:null, cat=btn.dataset.cat;
  if(ac==='a'){
    const t=tasks.find(x=>x.id===id);if(!t)return;
    t.assignee=A_ORDER[(A_ORDER.indexOf(t.assignee)+1)%A_ORDER.length];
    updateHeader();render();scheduleSave();
  } else if(ac==='s'){
    const t=tasks.find(x=>x.id===id);if(!t)return;
    t.status=S_ORDER[(S_ORDER.indexOf(t.status)+1)%S_ORDER.length];
    updateHeader();render();scheduleSave();
  } else if(ac==='d'){
    if(!confirm('Delete this task?')) return;
    tasks=tasks.filter(x=>x.id!==id);
    updateHeader();render();scheduleSave();
  } else if(ac==='of'){
    activeForm=cat;render();
  } else if(ac==='cx'){
    activeForm=null;render();
  } else if(ac==='ok'){
    const n=(document.getElementById('newName')||{}).value||'';
    if(!n.trim())return;
    const m=(document.getElementById('newMonth')||{}).value||'M1';
    const p=(document.getElementById('newPri')||{}).value||'med';
    tasks.push({id:Date.now(),category:cat,name:n.trim(),month:m,priority:p,status:'todo',assignee:'unassigned'});
    activeForm=null;updateHeader();render();scheduleSave();
  }
});

document.getElementById('content').addEventListener('keydown',e=>{
  if(!activeForm)return;
  if(e.key==='Enter'){
    const n=(document.getElementById('newName')||{}).value||'';
    if(!n.trim())return;
    const m=(document.getElementById('newMonth')||{}).value||'M1';
    const p=(document.getElementById('newPri')||{}).value||'med';
    tasks.push({id:Date.now(),category:activeForm,name:n.trim(),month:m,priority:p,status:'todo',assignee:'unassigned'});
    activeForm=null;updateHeader();render();scheduleSave();
  }
  if(e.key==='Escape'){activeForm=null;render();}
});

document.querySelectorAll('.fbtn').forEach(b=>{
  b.addEventListener('click',function(){
    const f=this.dataset.f,v=this.dataset.v;
    F[f]=v;
    document.querySelectorAll(`.fbtn[data-f="${f}"]`).forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    render();
  });
});

document.getElementById('search').addEventListener('input',function(){F.search=this.value;render();});

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('Reset ALL tasks to defaults? All assignments and progress will be lost.')) return;
  tasks=defaults();updateHeader();render();scheduleSave();
  showToast('Board reset to defaults');
});

loadFromBin();
</script>
